[pytest]
testpaths = tests
asyncio_mode = auto
filterwarnings =
    ignore::DeprecationWarning
# A project-local basetemp keeps the suite green on machines where the shared
# OS temp dir is locked by another process. cacheprovider is disabled for the
# same reason (no .pytest_cache writes).
addopts = -q -p no:cacheprovider --basetemp=.pytest-tmp
